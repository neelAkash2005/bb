<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let’s Celebrate 🎉</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 34%),
                linear-gradient(135deg, #fff7eb 0%, #ffe7b8 42%, #ffd5df 100%);
        }

        .celebrate-page {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .celebrate-card {
            position: relative;
            width: min(92vw, 920px);
            min-height: 92vh;
            border-radius: 34px;
            background: rgba(255, 255, 255, 0.38);
            backdrop-filter: blur(14px);
            box-shadow: 0 24px 70px rgba(164, 56, 95, 0.18), inset 0 0 0 1px rgba(255,255,255,0.55);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 2rem 1rem 1.5rem;
            text-align: center;
        }

        .glitter-rain {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .glitter {
            position: absolute;
            top: -12%;
            font-size: 12px;
            line-height: 1;
            opacity: 0;
            animation: glitterFall linear infinite;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.85));
        }

        .glitter::before {
            display: block;
        }

        .glitter.star::before {
            content: '✦';
            color: rgba(255, 250, 196, 0.98);
            text-shadow: 0 0 8px rgba(255, 245, 184, 0.85);
        }

        .glitter.heart::before {
            content: '❤';
            color: rgba(240, 72, 120, 0.82);
            text-shadow: 0 0 8px rgba(255, 122, 163, 0.55);
        }

        @keyframes glitterFall {
            0% {
                transform: translateY(-14vh) translateX(0) scale(0.8);
                opacity: 0;
            }
            10% {
                opacity: 0.92;
            }
            50% {
                transform: translateY(52vh) translateX(8px) scale(1);
                opacity: 0.72;
            }
            100% {
                transform: translateY(118vh) translateX(-10px) scale(0.7);
                opacity: 0;
            }
        }

        .celebrate-heading {
            color: #b51b57;
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            text-shadow: 0 2px 18px rgba(255, 255, 255, 0.9), 0 0 22px rgba(255, 126, 168, 0.26);
        }

        .celebrate-subtitle {
            max-width: 36rem;
            color: #8d2c55;
            font-weight: 700;
            font-size: clamp(1rem, 2.6vw, 1.35rem);
            line-height: 1.7;
        }

        .celebrate-layout {
            width: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 2;
        }

        .cake-stage {
            position: relative;
            width: min(80vw, 420px);
            height: min(54vw, 560px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-top: 0.5rem;
        }

        @keyframes glitterFall {
            0% {
                transform: translateY(-18vh) translateX(0) scale(0.76);
                opacity: 0;
            }
            8% {
                opacity: 0.98;
            }
            50% {
                transform: translateY(54vh) translateX(12px) scale(1.02);
                opacity: 0.8;
            }
            100% {
                transform: translateY(122vh) translateX(-14px) scale(0.72);
                opacity: 0;
            }
        }

        .plate {
            position: absolute;
            bottom: 5px;
            width: 100%;
            height: 42px;
            border-radius: 999px;
            background: linear-gradient(180deg, #ffffff 0%, #f3dbe4 100%);
            box-shadow: 0 12px 28px rgba(164, 56, 95, 0.18);
            opacity: 0;
            transform: translateY(16px) scale(0.96);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .cake-layer {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) scaleY(0.2);
            transform-origin: center bottom;
            border-radius: 24px 24px 18px 18px;
            opacity: 0;
            transition: transform 0.6s ease, opacity 0.6s ease;
        }

        .cake-layer.bottom {
            bottom: 44px;
            width: 88%;
            height: 112px;
            background: linear-gradient(180deg, #ff8bb0 0%, #d81f57 100%);
            box-shadow: 0 12px 26px rgba(164, 56, 95, 0.24);
        }

        .cake-layer.middle {
            bottom: 144px;
            width: 72%;
            height: 96px;
            background: linear-gradient(180deg, #ffca7c 0%, #ff9c2f 100%);
            box-shadow: 0 10px 22px rgba(164, 56, 95, 0.18);
        }

        .cake-layer.top {
            bottom: 228px;
            width: 56%;
            height: 82px;
            background: linear-gradient(180deg, #fff2b3 0%, #ffd65a 100%);
            box-shadow: 0 8px 18px rgba(164, 56, 95, 0.16);
        }

        .cake-layer::before,
        .cake-layer::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 999px;
        }

        .cake-layer::before {
            top: 18px;
        }

        .cake-layer::after {
            top: 44px;
            width: 84%;
            margin: 0 auto;
        }

        .cake-layer.bottom::after {
            width: 76%;
            top: 58px;
        }

        .cake-layer.middle::after {
            width: 68%;
            top: 46px;
        }

        .candle {
            position: absolute;
            left: 50%;
            bottom: 302px;
            width: 18px;
            height: 74px;
            margin-left: -9px;
            border-radius: 12px 12px 8px 8px;
            background: repeating-linear-gradient(
                180deg,
                #ffffff 0 12px,
                #ff7ba0 12px 24px
            );
            box-shadow: 0 8px 14px rgba(164, 56, 95, 0.16);
            opacity: 0;
            transform: translateY(14px) scale(0.9);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .candle.candle-drop {
            transform: translateY(46px) scale(0.82);
            opacity: 0.9;
        }

        .wick {
            position: absolute;
            left: 50%;
            top: -7px;
            width: 3px;
            height: 9px;
            margin-left: -1.5px;
            background: #4d2a1f;
            border-radius: 999px;
        }

        .flame {
            position: absolute;
            left: 50%;
            top: -34px;
            width: 22px;
            height: 32px;
            margin-left: -11px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            background: radial-gradient(circle at 35% 30%, #fff9d8 0%, #ffd857 35%, #ff9f2f 68%, rgba(255,159,47,0) 100%);
            filter: drop-shadow(0 0 12px rgba(255, 180, 74, 0.85));
            transform-origin: center bottom;
            animation: flicker 0.9s ease-in-out infinite;
        }

        .candle-smoke {
            position: absolute;
            left: 50%;
            top: -72px;
            width: 120px;
            height: 120px;
            margin-left: -60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.32) 0%, rgba(255,255,255,0.1) 34%, rgba(255,255,255,0) 70%);
            opacity: 0;
            animation: smokeRise 2.5s ease-in-out infinite;
        }

        .candle-message,
        .final-wish {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            opacity: 0;
            transition: opacity 0.45s ease, transform 0.45s ease;
            text-align: center;
            pointer-events: none;
            z-index: 4;
        }

        .candle-message {
            bottom: 226px;
            color: #a82a57;
            font-size: clamp(0.95rem, 2.2vw, 1.2rem);
            font-weight: 800;
            letter-spacing: 0.04em;
            text-shadow: 0 1px 10px rgba(255,255,255,0.85);
        }

        .final-wish {
            top: 58px;
            bottom: auto;
            width: min(84%, 28rem);
            color: #b11d57;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 900;
            line-height: 1.25;
            text-shadow: 0 2px 18px rgba(255,255,255,0.92), 0 0 22px rgba(255, 121, 162, 0.24);
        }

        .burst-rain {
            position: absolute;
            left: 50%;
            bottom: 188px;
            width: min(88vw, 520px);
            height: 220px;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 3;
        }

        .burst-piece {
            position: absolute;
            left: 50%;
            bottom: 72px;
            opacity: 0;
            font-size: 1.2rem;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.9));
            transform: translateX(-50%) translateY(0) scale(0.5);
        }

        .burst-piece.heart::before { content: '❤'; color: rgba(232, 49, 95, 0.92); }
        .burst-piece.star::before { content: '✦'; color: rgba(255, 246, 183, 0.98); }
        .burst-piece.spark::before { content: '✨'; color: rgba(255, 255, 255, 0.98); }

        .celebrate-card.show-burst .candle-message,
        .celebrate-card.show-burst .final-wish,
        .celebrate-card.show-burst .burst-piece {
            opacity: 1;
        }

        .celebrate-card.show-message .candle-message {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .celebrate-card.show-burst .final-wish {
            transform: translateX(-50%) translateY(0);
        }

        .celebrate-card.show-burst .burst-piece {
            animation: burstFloat 1.8s ease-out forwards;
        }

        .b1 { margin-left: -130px; animation-delay: 0.02s; }
        .b2 { margin-left: -98px; animation-delay: 0.08s; }
        .b3 { margin-left: -68px; animation-delay: 0.14s; }
        .b4 { margin-left: -36px; animation-delay: 0.2s; }
        .b5 { margin-left: -6px; animation-delay: 0.26s; }
        .b6 { margin-left: 24px; animation-delay: 0.1s; }
        .b7 { margin-left: 56px; animation-delay: 0.18s; }
        .b8 { margin-left: 90px; animation-delay: 0.24s; }
        .b9 { margin-left: 124px; animation-delay: 0.3s; }

        .b1 { bottom: 66px; }
        .b2 { bottom: 88px; }
        .b3 { bottom: 56px; }
        .b4 { bottom: 96px; }
        .b5 { bottom: 72px; }
        .b6 { bottom: 84px; }
        .b7 { bottom: 54px; }
        .b8 { bottom: 92px; }
        .b9 { bottom: 64px; }

        .b1, .b3, .b5, .b7, .b9 { font-size: 1rem; }
        .b2, .b4, .b6, .b8 { font-size: 1.35rem; }

        @keyframes burstFloat {
            0% {
                transform: translateX(-50%) translateY(14px) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            100% {
                transform: translateX(-50%) translateY(-132px) scale(1.05) rotate(18deg);
                opacity: 0;
            }
        }

        .sprinkles {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .sprinkle {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0;
            animation: sprinkleFloat 4.5s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.85));
        }

        .s1 { top: 12%; left: 10%; animation-delay: 0.2s; }
        .s2 { top: 22%; right: 12%; animation-delay: 0.9s; }
        .s3 { top: 72%; left: 14%; animation-delay: 1.2s; }
        .s4 { top: 68%; right: 16%; animation-delay: 1.5s; }

        .cake-stage.show .plate,
        .cake-stage.show .cake-layer,
        .cake-stage.show .candle {
            opacity: 1;
            transform: translateX(-50%) scaleY(1);
        }

        .cake-stage.show .plate {
            transform: translateY(0) scale(1);
        }

        .cake-stage.show .cake-layer.bottom {
            animation: layerRise 0.7s ease-out 0.2s forwards;
        }

        .cake-stage.show .cake-layer.middle {
            animation: layerRise 0.7s ease-out 0.75s forwards;
        }

        .cake-stage.show .cake-layer.top {
            animation: layerRise 0.7s ease-out 1.3s forwards;
        }

        .cake-stage.show .candle {
            animation: candleRise 0.7s ease-out 1.9s forwards;
        }

        .cake-stage.show .flame {
            animation: flicker 0.85s ease-in-out 2.1s infinite;
        }

        .cake-stage.show .candle.candle-drop {
            animation: none;
        }

        .back-btn {
            margin-top: 0.4rem;
        }

        .home-shortcut {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 120;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 800;
            color: #9c2451;
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 8px 18px rgba(164, 56, 95, 0.18);
            backdrop-filter: blur(8px);
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }

        .home-shortcut:hover {
            transform: translateY(-2px) scale(1.04);
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 10px 22px rgba(164, 56, 95, 0.24);
        }

        .home-shortcut:active {
            transform: translateY(0) scale(0.98);
        }

        @keyframes layerRise {
            from {
                transform: translateX(-50%) translateY(26px) scaleY(0.2);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0) scaleY(1);
                opacity: 1;
            }
        }

        @keyframes candleRise {
            from {
                transform: translateY(20px) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes flicker {
            0%, 100% { transform: translateY(0) scale(1); }
            25% { transform: translateY(-1px) scale(1.05, 0.95) rotate(-3deg); }
            50% { transform: translateY(1px) scale(0.95, 1.05) rotate(3deg); }
            75% { transform: translateY(-1px) scale(1.08, 0.92) rotate(-2deg); }
        }

        @keyframes smokeRise {
            0% { transform: translateY(18px) scale(0.85); opacity: 0; }
            20% { opacity: 0.65; }
            100% { transform: translateY(-28px) scale(1.15); opacity: 0; }
        }

        @keyframes sprinkleFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.75; }
            50% { transform: translateY(-16px) rotate(8deg); opacity: 1; }
        }

        @media (max-width: 480px) {
            .celebrate-card {
                padding: 1.4rem 0.9rem 1.1rem;
            }

            .cake-stage {
                width: 92vw;
                height: 420px;
            }
        }
    </style>
</head>
<body>
    <div class="celebrate-page">
        <button class="home-shortcut" type="button" onclick="window.location.href='index.html'" aria-label="Return to home">⌂</button>
        <div class="celebrate-card">
            <div class="glitter-rain" aria-hidden="true">
                <span class="glitter star" style="left: 4%; animation-duration: 8.4s; animation-delay: 0.1s;"></span>
                <span class="glitter heart" style="left: 9%; animation-duration: 7.8s; animation-delay: 1s;"></span>
                <span class="glitter star" style="left: 15%; animation-duration: 8.9s; animation-delay: 0.5s;"></span>
                <span class="glitter heart" style="left: 21%; animation-duration: 7.4s; animation-delay: 1.4s;"></span>
                <span class="glitter star" style="left: 27%; animation-duration: 8.1s; animation-delay: 0.2s;"></span>
                <span class="glitter heart" style="left: 33%; animation-duration: 9.2s; animation-delay: 1.2s;"></span>
                <span class="glitter star" style="left: 39%; animation-duration: 7.6s; animation-delay: 0.7s;"></span>
                <span class="glitter heart" style="left: 45%; animation-duration: 8.8s; animation-delay: 1.6s;"></span>
                <span class="glitter star" style="left: 51%; animation-duration: 7.9s; animation-delay: 0.4s;"></span>
                <span class="glitter heart" style="left: 57%; animation-duration: 8.5s; animation-delay: 1.1s;"></span>
                <span class="glitter star" style="left: 63%; animation-duration: 9.1s; animation-delay: 0.3s;"></span>
                <span class="glitter heart" style="left: 69%; animation-duration: 7.2s; animation-delay: 1.5s;"></span>
                <span class="glitter star" style="left: 75%; animation-duration: 8.3s; animation-delay: 0.6s;"></span>
                <span class="glitter heart" style="left: 81%; animation-duration: 9s; animation-delay: 1.3s;"></span>
                <span class="glitter star" style="left: 87%; animation-duration: 8.2s; animation-delay: 0.8s;"></span>
                <span class="glitter heart" style="left: 93%; animation-duration: 7.7s; animation-delay: 1.8s;"></span>
                <span class="glitter star" style="left: 2%; animation-duration: 7.9s; animation-delay: 0.6s;"></span>
                <span class="glitter heart" style="left: 6%; animation-duration: 8.6s; animation-delay: 0.2s;"></span>
                <span class="glitter star" style="left: 12%; animation-duration: 9.3s; animation-delay: 1.7s;"></span>
                <span class="glitter heart" style="left: 18%; animation-duration: 7.1s; animation-delay: 0.9s;"></span>
                <span class="glitter star" style="left: 24%; animation-duration: 8.7s; animation-delay: 1.4s;"></span>
                <span class="glitter heart" style="left: 30%; animation-duration: 7.5s; animation-delay: 0.3s;"></span>
                <span class="glitter star" style="left: 36%; animation-duration: 9.1s; animation-delay: 1.1s;"></span>
                <span class="glitter heart" style="left: 42%; animation-duration: 8.2s; animation-delay: 0.5s;"></span>
                <span class="glitter star" style="left: 48%; animation-duration: 7.8s; animation-delay: 1.8s;"></span>
                <span class="glitter heart" style="left: 54%; animation-duration: 9.4s; animation-delay: 0.8s;"></span>
                <span class="glitter star" style="left: 60%; animation-duration: 7.3s; animation-delay: 1.5s;"></span>
                <span class="glitter heart" style="left: 66%; animation-duration: 8.9s; animation-delay: 0.4s;"></span>
                <span class="glitter star" style="left: 72%; animation-duration: 7.6s; animation-delay: 1.2s;"></span>
                <span class="glitter heart" style="left: 78%; animation-duration: 8.4s; animation-delay: 0.7s;"></span>
                <span class="glitter star" style="left: 84%; animation-duration: 9.2s; animation-delay: 0.1s;"></span>
                <span class="glitter heart" style="left: 90%; animation-duration: 7.4s; animation-delay: 1.6s;"></span>
                <span class="glitter star" style="left: 96%; animation-duration: 8.8s; animation-delay: 0.9s;"></span>
            </div>

            <div class="sprinkles" aria-hidden="true">
                <span class="sprinkle s1">✨</span>
                <span class="sprinkle s2">🎊</span>
                <span class="sprinkle s3">✨</span>
                <span class="sprinkle s4">🎉</span>
            </div>

            <h1 class="celebrate-heading">Happy Birthday 🎉</h1>
            <p class="celebrate-subtitle">A cake builds up layer by layer, and the candle burns bright for the celebration.</p>

            <div class="celebrate-layout">
                <div class="cake-stage" id="cakeStage">
                    <div class="plate"></div>
                    <div class="cake-layer bottom"></div>
                    <div class="cake-layer middle"></div>
                    <div class="cake-layer top"></div>
                    <div class="candle">
                        <div class="wick"></div>
                        <div class="flame"></div>
                        <div class="candle-smoke"></div>
                    </div>
                    <div class="candle-message" id="candleMessage">Make a wish below the candle</div>
                    <div class="burst-rain" aria-hidden="true">
                        <span class="burst-piece heart b1"></span>
                        <span class="burst-piece star b2"></span>
                        <span class="burst-piece spark b3"></span>
                        <span class="burst-piece heart b4"></span>
                        <span class="burst-piece star b5"></span>
                        <span class="burst-piece spark b6"></span>
                        <span class="burst-piece heart b7"></span>
                        <span class="burst-piece star b8"></span>
                        <span class="burst-piece spark b9"></span>
                    </div>
                    <div class="final-wish" id="finalWish">Many many happy returns of the day</div>
                </div>
            </div>

            <button class="btn btn-primary back-btn" onclick="window.location.href='index.html'">Back to memories</button>
        </div>
    </div>

    <audio id="finalTuneAudio" preload="auto" autoplay playsinline src="final-tune.mp3"></audio>

    <script>
        window.addEventListener('load', () => {
            const celebrateCard = document.querySelector('.celebrate-card');
            const cakeStage = document.getElementById('cakeStage');
            const candleMessage = document.getElementById('candleMessage');
            const finalWish = document.getElementById('finalWish');
            const candle = cakeStage ? cakeStage.querySelector('.candle') : null;
            const finalTuneAudio = document.getElementById('finalTuneAudio');

            const startFinalTune = () => {
                if (!finalTuneAudio) {
                    return;
                }

                finalTuneAudio.volume = 1;
                finalTuneAudio.playbackRate = 1.03;
                finalTuneAudio.currentTime = 0;
                finalTuneAudio.play().catch(() => {});
            };

            if (cakeStage) {
                setTimeout(() => cakeStage.classList.add('show'), 120);
            }

            startFinalTune();

            if (finalTuneAudio) {
                const resumeFinalTune = () => {
                    startFinalTune();
                    window.removeEventListener('pointerdown', resumeFinalTune);
                    window.removeEventListener('keydown', resumeFinalTune);
                    window.removeEventListener('touchstart', resumeFinalTune);
                };

                window.addEventListener('pointerdown', resumeFinalTune, { once: true });
                window.addEventListener('keydown', resumeFinalTune, { once: true });
                window.addEventListener('touchstart', resumeFinalTune, { once: true });
            }

            setTimeout(() => {
                if (celebrateCard) {
                    celebrateCard.classList.add('show-message');
                }
                if (candleMessage) {
                    candleMessage.textContent = 'Please blow the candle';
                }
            }, 5000);

            setTimeout(() => {
                if (candle) {
                    candle.classList.add('candle-drop');
                }
                if (celebrateCard) {
                    celebrateCard.classList.add('show-burst');
                }
                if (candleMessage) {
                    candleMessage.textContent = 'The celebration starts now';
                }
                if (finalWish) {
                    finalWish.textContent = 'Many many happy returns of the day';
                }
            }, 8000);
        });
    </script>
</body>
</html>
